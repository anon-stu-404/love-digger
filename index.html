<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💕 Love Digger · Rizwan 💘 Anha</title>
  <style>
    /* ---------- RESET & GLOBAL ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Quicksand', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, #ffb6d1, #f9a8d4);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    /* Main game card */
    #game {
      width: 100%;
      max-width: 440px;
      background: rgba(255, 240, 245, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 56px 56px 40px 40px;
      box-shadow: 0 30px 40px rgba(200, 80, 120, 0.4), 0 10px 20px rgba(0,0,0,0.1);
      border: 3px solid rgba(255, 255, 255, 0.7);
      padding: 24px 18px 30px;
      transition: transform 0.3s ease;
    }

    /* ---------- TYPOGRAPHY & ICONS ---------- */
    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #a13e5f;
      text-align: center;
      text-shadow: 4px 4px 0 #ffd9e8;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    h1 span {
      font-size: 3rem;
      animation: float 2.5s infinite ease-in-out;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* ---------- ROOM SCREEN ---------- */
    .screen {
      display: none;
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.3s ease;
    }
    .screen.active {
      display: block;
      opacity: 1;
      transform: scale(1);
    }

    .room-panel {
      background: rgba(255, 220, 235, 0.6);
      border-radius: 60px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border: 2px solid white;
    }
    .room-panel input {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 50px;
      background: white;
      font-size: 1.1rem;
      box-shadow: inset 0 4px 8px #fec5dd;
      outline: 2px solid transparent;
      transition: 0.2s;
      text-align: center;
      font-weight: 600;
    }
    .room-panel input:focus {
      outline-color: #ff98bb;
    }
    .room-panel button {
      background: #ff8eb5;
      border: none;
      border-radius: 50px;
      padding: 16px;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
      box-shadow: 0 8px 0 #b34e71, 0 6px 15px rgba(180,70,120,0.3);
      cursor: pointer;
      transition: 0.08s linear;
      border: 2px solid white;
    }
    .room-panel button:active {
      transform: translateY(8px);
      box-shadow: 0 2px 0 #b34e71;
    }

    .name-input {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .name-input input {
      flex: 1;
      padding: 14px;
      border-radius: 40px;
      border: 2px solid #ffb8d2;
    }

    /* ---------- GAME HEADER ---------- */
    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.5);
      padding: 12px 18px;
      border-radius: 50px;
      border: 2px solid white;
      margin-bottom: 16px;
    }
    .timer-box {
      background: #402e36;
      color: #ffcedf;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.3rem;
      box-shadow: inset 0 -4px 0 #261a20;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .timer-bar-bg {
      width: 60px;
      height: 8px;
      background: #7a5b68;
      border-radius: 20px;
      overflow: hidden;
    }
    .timer-bar-fill {
      height: 100%;
      width: 100%;
      background: #ffd966;
      border-radius: 20px;
      transition: width 1s linear;
    }
    .score-box {
      background: white;
      border-radius: 40px;
      padding: 8px 20px;
      font-weight: 700;
      color: #b84774;
      box-shadow: 0 5px 0 #ffb0c8;
    }

    /* ---------- TURN INDICATOR + HOT METER ---------- */
    .turn-area {
      background: #ffdae9;
      border-radius: 40px;
      padding: 14px 20px;
      margin: 16px 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 3px dashed white;
    }
    .turn-text {
      font-weight: 700;
      font-size: 1.2rem;
      color: #791e45;
    }
    .hot-meter {
      background: #ffe2f0;
      border-radius: 40px;
      padding: 6px 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: inset 0 2px 6px #feadc6;
    }
    .hot-indicator {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #b0d0ff;
      transition: background 0.2s, transform 0.2s;
    }
    .hot-indicator.hot { background: #ff4d4d; transform: scale(1.2); }
    .hot-indicator.warm { background: #ffaa33; }
    .hot-indicator.cold { background: #6bc5ff; }
    .hot-indicator.none { background: #c0c0c0; }

    /* ---------- GRID ---------- */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      background: rgba(255, 220, 235, 0.5);
      padding: 18px 10px;
      border-radius: 44px;
      border: 3px solid white;
      margin: 10px 0;
    }
    .cell {
      aspect-ratio: 1/1;
      background: #ffefd5;
      border-radius: 20px;
      box-shadow: 0 8px 0 #c08caa, 0 6px 12px rgba(140, 70, 100, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      transition: 0.08s linear;
      border: 2px solid white;
      transform: translateY(-2px);
      cursor: pointer;
    }
    .cell:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #c08caa;
    }
    .cell.heart {
      background: #ffb3c6;
      color: #ff3b6f;
      animation: pop 0.3s;
    }
    .cell.dig {
      background: #cdb6c0;
      box-shadow: 0 4px 0 #8e6b78;
      transform: translateY(4px);
      font-size: 1.8rem;
    }
    .cell.dig.found {
      background: #ff9ebb;
      animation: heartFound 0.5s;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    @keyframes heartFound {
      0% { transform: scale(1); }
      30% { transform: scale(1.4); background: #ffc0cb; }
    }

    /* ---------- LOVES LEFT & CHAT ---------- */
    .action-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 16px 0 10px;
    }
    .loves-left {
      background: #ffe2ed;
      border-radius: 40px;
      padding: 12px 24px;
      font-weight: 700;
      color: #a13560;
      box-shadow: 0 5px 0 #cc8ca8;
      border: 2px solid white;
    }
    .chat-icon {
      background: #ffb1c7;
      border-radius: 50%;
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      cursor: pointer;
      box-shadow: 0 7px 0 #b34e71;
      border: 2px solid white;
      transition: 0.08s;
    }
    .chat-icon:active {
      transform: translateY(7px);
      box-shadow: none;
    }
    .chat-panel {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(4px);
      border-radius: 40px 40px 30px 30px;
      padding: 18px 14px;
      border: 3px solid #ffbfd5;
      display: none;
      flex-direction: column;
      margin-top: 12px;
      transition: all 0.3s;
    }
    .chat-panel.show {
      display: flex;
    }
    .chat-messages {
      max-height: 160px;
      overflow-y: auto;
      background: #fff3f7;
      border-radius: 30px;
      padding: 14px;
      margin-bottom: 12px;
      font-size: 0.95rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .chat-message {
      background: #ffeef4;
      padding: 8px 14px;
      border-radius: 24px;
      max-width: 85%;
      align-self: flex-start;
      word-break: break-word;
      border: 1px solid white;
    }
    .chat-message.own {
      background: #ffd5e5;
      align-self: flex-end;
    }
    .chat-message .name {
      font-weight: 700;
      color: #b84774;
      font-size: 0.8rem;
    }
    .chat-message .time {
      font-size: 0.7rem;
      color: #a77;
      margin-left: 8px;
    }
    .chat-input-area {
      display: flex;
      gap: 8px;
    }
    .chat-input-area input {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 40px;
      background: #fff0f5;
      outline: 2px solid #ffbfd5;
    }
    .chat-input-area button {
      background: #ff85b1;
      border: none;
      border-radius: 40px;
      padding: 0 20px;
      color: white;
      font-weight: bold;
      border: 2px solid white;
      box-shadow: 0 5px 0 #b34e71;
      cursor: pointer;
    }
    .chat-input-area button:active {
      transform: translateY(5px);
      box-shadow: none;
    }

    /* ---------- READY BUTTON ---------- */
    .ready-btn {
      background: #b0e0b0;
      border: none;
      border-radius: 40px;
      padding: 12px 24px;
      font-weight: 700;
      color: #2d6b2d;
      box-shadow: 0 6px 0 #5f9e5f;
      border: 2px solid white;
      cursor: pointer;
      font-size: 1.1rem;
      transition: 0.08s;
    }
    .ready-btn:active {
      transform: translateY(6px);
      box-shadow: none;
    }

    /* ---------- RESULT SCREEN ---------- */
    .result-box {
      text-align: center;
      padding: 30px 10px;
    }
    .trophy {
      font-size: 6rem;
      animation: spin 2s infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0); }
      25% { transform: rotate(10deg); }
      75% { transform: rotate(-10deg); }
    }
    .winner-name {
      font-size: 2.5rem;
      font-weight: 800;
      color: #c6477c;
      margin: 20px 0;
    }
    .play-again {
      background: #ff98bb;
      border: none;
      border-radius: 60px;
      padding: 18px 40px;
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
      box-shadow: 0 10px 0 #b34e71;
      border: 3px solid white;
      cursor: pointer;
    }
    .play-again:active {
      transform: translateY(10px);
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div id="game">
    <h1>
      <span>💖</span> LOVE DIGGER <span>💖</span>
    </h1>

    <!-- Room Screen -->
    <div id="roomScreen" class="screen active">
      <div class="room-panel">
        <input type="text" id="roomCodeInput" placeholder="enter room code" />
        <div class="name-input">
          <input type="text" id="playerNameInput" placeholder="your name" value="Rizwan" />
          <button id="joinRoomBtn">Join</button>
        </div>
        <button id="createRoomBtn">✨ Create new room</button>
      </div>
      <div id="roomInfo" style="margin-top:20px; text-align:center; font-weight:600;"></div>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="screen">
      <div class="game-header">
        <div class="timer-box">
          <span id="timerDisplay">02:00</span>
          <div class="timer-bar-bg"><div id="timerBarFill" class="timer-bar-fill" style="width:100%"></div></div>
        </div>
        <div class="score-box" id="scoreDisplay">❤️ 0</div>
      </div>

      <div class="turn-area">
        <span class="turn-text" id="turnIndicator">✨ your turn</span>
        <div class="hot-meter" id="hotMeter">
          <span id="hotLabel">❄️ Cold</span>
          <div class="hot-indicator cold" id="hotLight"></div>
        </div>
      </div>

      <div id="grid" class="grid-container"></div>

      <div class="action-bar">
        <div class="loves-left" id="lovesLeft">❤️ 10 left</div>
        <div class="chat-icon" id="chatToggle">💬</div>
      </div>

      <!-- Chat Panel -->
      <div id="chatPanel" class="chat-panel">
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-area">
          <input type="text" id="chatInput" placeholder="type a message..." />
          <button id="sendChat">Send</button>
        </div>
      </div>

      <!-- Ready button (only during placement) -->
      <div style="display:flex; justify-content:center; margin:10px 0;">
        <button id="readyBtn" class="ready-btn">✅ I'm ready</button>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="resultScreen" class="screen">
      <div class="result-box">
        <div class="trophy">🏆</div>
        <div id="winnerMessage" class="winner-name"></div>
        <button id="playAgainBtn" class="play-again">💞 Play again</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    (function() {
      const socket = io();

      // DOM elements
      const roomScreen = document.getElementById('roomScreen');
      const gameScreen = document.getElementById('gameScreen');
      const resultScreen = document.getElementById('resultScreen');
      const roomCodeInput = document.getElementById('roomCodeInput');
      const playerNameInput = document.getElementById('playerNameInput');
      const joinBtn = document.getElementById('joinRoomBtn');
      const createBtn = document.getElementById('createRoomBtn');
      const roomInfo = document.getElementById('roomInfo');
      const gridEl = document.getElementById('grid');
      const timerDisplay = document.getElementById('timerDisplay');
      const timerBarFill = document.getElementById('timerBarFill');
      const scoreDisplay = document.getElementById('scoreDisplay');
      const turnIndicator = document.getElementById('turnIndicator');
      const hotLabel = document.getElementById('hotLabel');
      const hotLight = document.getElementById('hotLight');
      const lovesLeftEl = document.getElementById('lovesLeft');
      const readyBtn = document.getElementById('readyBtn');
      const chatToggle = document.getElementById('chatToggle');
      const chatPanel = document.getElementById('chatPanel');
      const chatMessages = document.getElementById('chatMessages');
      const chatInput = document.getElementById('chatInput');
      const sendChat = document.getElementById('sendChat');
      const winnerMessage = document.getElementById('winnerMessage');
      const playAgainBtn = document.getElementById('playAgainBtn');

      // Game state
      let currentRoom = null;
      let myId = null;
      let myName = 'Rizwan'; // default
      let players = [];
      let playerNames = {};
      let currentPhase = 'placement'; // 'placement', 'digging', 'result'
      let myTurn = false;
      let lovesToPlace = 10;
      let myLoves = []; // indices where i placed hearts (for placement)
      let boardState = Array(50).fill(null); // null, 'heart', 'empty', 'found'
      let scores = {};

      // Helper to get player name by id
      function getName(id) {
        return playerNames[id] || (id === myId ? myName : 'Opponent');
      }

      // Render 5x10 grid
      function renderGrid() {
        gridEl.innerHTML = '';
        for (let i = 0; i < 50; i++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.index = i;
          cell.dataset.row = Math.floor(i / 5);
          cell.dataset.col = i % 5;
          cell.addEventListener('click', onCellClick);
          gridEl.appendChild(cell);
        }
        updateGridAppearance();
      }

      function updateGridAppearance() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach((cell, idx) => {
          cell.classList.remove('heart', 'dig', 'found');
          cell.textContent = '';
          if (boardState[idx] === 'heart') {
            cell.classList.add('heart');
            cell.textContent = '❤️';
          } else if (boardState[idx] === 'empty') {
            cell.classList.add('dig');
            cell.textContent = '🕳️';
          } else if (boardState[idx] === 'found') {
            cell.classList.add('dig', 'found');
            cell.textContent = '💖';
          }
        });
      }

      function onCellClick(e) {
        const index = e.currentTarget.dataset.index;
        if (currentPhase === 'placement') {
          if (!myTurn) return;
          if (lovesToPlace <= 0 && !myLoves.includes(index)) return; // can't add more than 10
          if (myLoves.includes(index)) {
            // remove
            myLoves = myLoves.filter(i => i !== index);
            boardState[index] = null;
            lovesToPlace++;
          } else {
            if (myLoves.length >= 10) return;
            myLoves.push(index);
            boardState[index] = 'heart';
            lovesToPlace--;
          }
          lovesLeftEl.textContent = `❤️ ${lovesToPlace} left`;
          updateGridAppearance();
        } else if (currentPhase === 'digging') {
          if (!myTurn) return;
          const row = Math.floor(index / 5);
          const col = index % 5;
          socket.emit('dig', { roomCode: currentRoom, row, col });
        }
      }

      // Chat
      chatToggle.addEventListener('click', () => {
        chatPanel.classList.toggle('show');
      });

      sendChat.addEventListener('click', () => {
        const msg = chatInput.value.trim();
        if (msg && currentRoom) {
          socket.emit('chat', { roomCode: currentRoom, message: msg });
          chatInput.value = '';
        }
      });

      chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendChat.click();
      });

      // Ready button
      readyBtn.addEventListener('click', () => {
        if (currentPhase === 'placement' && myTurn) {
          if (myLoves.length === 10) {
            const loves = myLoves.map(idx => [Math.floor(idx/5), idx%5]);
            socket.emit('placeLoves', { roomCode: currentRoom, loves });
            myTurn = false;
            turnIndicator.innerText = `⏳ waiting for ${getName(players.find(id => id !== myId))}`;
            readyBtn.style.display = 'none';
          } else {
            alert(`You need to place exactly 10 hearts! (${myLoves.length} placed)`);
          }
        }
      });

      // Socket events
      socket.on('connect', () => {
        myId = socket.id;
      });

      socket.on('roomCreated', (code) => {
        currentRoom = code;
        myName = playerNameInput.value.trim() || 'Rizwan';
        socket.emit('setName', { roomCode: code, name: myName });
        roomInfo.innerText = `✨ Room code: ${code} (share with Anha)`;
      });

      socket.on('roomJoined', (code) => {
        currentRoom = code;
        myName = playerNameInput.value.trim() || 'Anha';
        socket.emit('setName', { roomCode: code, name: myName });
        roomScreen.classList.remove('active');
        gameScreen.classList.add('active');
        renderGrid();
      });

      socket.on('gameStart', ({ players: p, names }) => {
        players = p;
        playerNames = names;
        myName = playerNames[myId] || myName;
        roomScreen.classList.remove('active');
        gameScreen.classList.add('active');
        renderGrid();
        // Ensure ready button visible during placement
        readyBtn.style.display = 'block';
        lovesToPlace = 10;
        myLoves = [];
        boardState.fill(null);
        updateGridAppearance();
        lovesLeftEl.textContent = '❤️ 10 left';
        currentPhase = 'placement';
        myTurn = (players[0] === myId); // first player starts placement
        turnIndicator.innerText = myTurn ? '✨ your turn to place' : `✨ ${getName(players[0])} is placing`;
      });

      socket.on('phaseChange', ({ phase, turn, scores: newScores }) => {
        currentPhase = phase;
        if (phase === 'digging') {
          phase = '⛏️ digging';
          readyBtn.style.display = 'none';
          boardState.fill(null);
          updateGridAppearance();
          if (turn) {
            myTurn = (turn === myId);
            turnIndicator.innerText = myTurn ? '⛏️ your turn to dig' : `⛏️ ${getName(turn)}'s turn`;
          }
          if (newScores) {
            scores = newScores;
            updateScore();
          }
        } else if (phase === 'result') {
          gameScreen.classList.remove('active');
          resultScreen.classList.add('active');
          // Show winner
          let myScore = scores[myId] || 0;
          let opponentId = players.find(id => id !== myId);
          let opponentScore = scores[opponentId] || 0;
          if (myScore > opponentScore) winnerMessage.innerText = `You win, ${myName}! 💕`;
          else if (myScore < opponentScore) winnerMessage.innerText = `${getName(opponentId)} wins! 💔`;
          else winnerMessage.innerText = `It's a tie! 🎀`;

          // Confetti (simple)
          for (let i=0; i<10; i++) {
            setTimeout(() => {
              let conf = document.createElement('div');
              conf.style.position = 'fixed';
              conf.style.left = Math.random()*100 + '%';
              conf.style.top = '-10px';
              conf.style.fontSize = '2rem';
              conf.innerText = '🎉';
              conf.style.pointerEvents = 'none';
              conf.style.animation = 'fall 2s linear';
              document.body.appendChild(conf);
              setTimeout(() => conf.remove(), 2000);
            }, i*100);
          }
        }
      });

      socket.on('turnChange', (turnPlayerId) => {
        myTurn = (turnPlayerId === myId);
        const name = getName(turnPlayerId);
        turnIndicator.innerText = myTurn ? '⛏️ your turn to dig' : `⛏️ ${name}'s turn`;
      });

      socket.on('digResult', ({ player, row, col, found, hotness, digsLeft, scores: newScores }) => {
        const index = row * 5 + col;
        if (found) {
          boardState[index] = 'found';
        } else {
          boardState[index] = 'empty';
        }
        scores = newScores;
        updateGridAppearance();
        updateScore();

        // Update hot meter
        let hotText = '', hotClass = '';
        if (hotness === 'hot') { hotText = '🔥 Hot'; hotClass = 'hot'; }
        else if (hotness === 'warm') { hotText = '🌡️ Warm'; hotClass = 'warm'; }
        else if (hotness === 'cold') { hotText = '❄️ Cold'; hotClass = 'cold'; }
        else if (hotness === 'none') { hotText = '✨ None left'; hotClass = 'none'; }
        hotLabel.innerText = hotText;
        hotLight.className = `hot-indicator ${hotClass}`;
      });

      socket.on('digIgnored', (msg) => {
        // Optional: show toast
      });

      socket.on('timer', (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        timerDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        const percent = (seconds / 120) * 100;
        timerBarFill.style.width = `${percent}%`;
      });

      socket.on('chat', ({ sender, name, message, time }) => {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'chat-message' + (sender === myId ? ' own' : '');
        msgDiv.innerHTML = `<span class="name">${name}</span> <span class="time">${time}</span><br>${message}`;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });

      function updateScore() {
        const myScore = scores[myId] || 0;
        scoreDisplay.innerText = `❤️ ${myScore}`;
      }

      // Create room
      createBtn.addEventListener('click', () => {
        socket.emit('createRoom');
      });

      // Join room
      joinBtn.addEventListener('click', () => {
        const code = roomCodeInput.value.trim().toUpperCase();
        const name = playerNameInput.value.trim();
        if (code) {
          socket.emit('joinRoom', { roomCode: code, name });
        }
      });

      // Play again
      playAgainBtn.addEventListener('click', () => {
        resultScreen.classList.remove('active');
        roomScreen.classList.add('active');
        currentRoom = null;
        boardState.fill(null);
        updateGridAppearance();
      });

      // CSS for confetti
      const style = document.createElement('style');
      style.innerHTML = `
        @keyframes fall {
          0% { transform: translateY(0) rotate(0); opacity:1; }
          100% { transform: translateY(100vh) rotate(360deg); opacity:0; }
        }
      `;
      document.head.appendChild(style);

      // Initial render
      renderGrid();
    })();
  </script>
</body>
</html>
